{%extends 'base.html'%}
{%block content%}
	<form method="post" class="buttons">
		<h3> Enter the chat room</h3>
		<div>
			<label> Name:
				<input
                    type="text"
                    name="name"
                    placeholder="Enter a name!"
                    value="{{name}}"
                />
			</label>
		</div>
		
		<div class="join">
			<input
                type="text"
                name="code"
                placeholder="Room Code"
                value="{{code}}"
            />
			<button
                type="submit"
                name="join">
                    Join a Room
            </button>
		</div>
		
		<button
            type="submit"
            name="create" 
            class="create-btn">
                Create a Room
        </button>
			
	</form>
	{% if error %}
		<ul>
			<li> {{error}} </li>
		<ul>
	{% endif %}
{%endblock%}
